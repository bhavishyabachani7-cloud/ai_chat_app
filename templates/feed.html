<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI Hub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    <!-- 📊 UMAMI LIVE VISITOR TRACKING CORE -->
    <script defer src="https://cloud.umami.is/script.js" data-website-id="<script defer src="https://cloud.umami.is/script.js" data-website-id="b8485b12-8cfa-4e25-852d-c08c9b03defc"></script>"></script>
</head>
<body>

    <div id="gender-screen" class="gender-screen" style="display:none;">
        <div class="gender-box glass glow-glow">
            <h2>Identify Context</h2>
            <p style="color:#a1a1aa; font-size:14px; margin-bottom:24px;">Choose your gender to anchor character dialogue behaviors</p>
            <div class="btn-group">
                <button onclick="setGender('male')">👦 Male Context</button>
                <button onclick="setGender('female')">👧 Female Context</button>
            </div>
        </div>
    </div>

    <div class="feed-header">
        <h2>Explore Entities</h2>
        <span>Uncensored storylines, deep bonds, absolute freedom. 😏</span>
    </div>

    <div id="feed-native-ad" style="max-width: 728px; width: 100%; margin: 0 auto 30px; text-align: center; padding: 0 20px;">
        <div style="border: 1px dashed rgba(255,255,255,0.1); padding: 15px; border-radius: 16px; font-size: 0.8rem; color: rgba(255,255,255,0.3); background: rgba(0,0,0,0.1);">
            Sponsored Content Placeholder
        </div>
    </div>

    <div class="search-bar">
        <input type="text" placeholder="Search characters by vibe..." id="searchBox">
    </div>

    <div class="feed" id="feed">
        {% for name, c in characters.items() %}
        <a href="/chat/{{ name }}" class="card">
            <div class="img-box">
                <img src="{{ url_for('static', filename=c.image) }}" alt="{{ name }}">
                <div class="overlay"></div>
            </div>
            <div class="info">
                <h3>{{ name }}</h3>
                <p>{{ c.style }}</p>
            </div>
        </a>
        {% endfor %}
    </div>

    <script>
        window.addEventListener("load", function () {
            if (!localStorage.getItem("genderSelected")) {
                document.getElementById("gender-screen").style.display = "flex";
            }
        });

        function setGender(gender) {
            fetch("/set_gender", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ gender })
            }).then(() => {
                localStorage.setItem("genderSelected", "true");
                document.getElementById("gender-screen").style.filter = "opacity(0)";
                setTimeout(() => {
                    document.getElementById("gender-screen").style.display = "none";
                }, 300);
            });
        }

        document.getElementById("searchBox").addEventListener("input", function () {
            let query = this.value.toLowerCase();
            document.querySelectorAll(".card").forEach(card => {
                let text = card.innerText.toLowerCase();
                card.style.display = text.includes(query) ? "block" : "none";
            });
        });
    </script>
</body>
</html>
