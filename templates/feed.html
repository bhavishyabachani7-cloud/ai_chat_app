<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI Hub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script defer src="https://cloud.umami.is/script.js" data-website-id="b8485b12-8cfa-4e25-852d-c08c9b03defc"></script>
    
    <!-- Adsterra Native Banner Script Placement -->
    <script async="async" data-cfasync="false" src="https://pl29884998.effectivecpmnetwork.com/0882fc47ffd4aea098bb26ed2dd6a149/invoke.js"></script>
</head>
<body>

    <div class="feed-header">
        <h2>Explore Entities</h2>
        <span>Uncensored storylines, deep bonds, absolute freedom. 😏</span>
    </div>

    <div class="search-bar">
        <input type="text" placeholder="Search characters by vibe..." id="searchBox">
    </div>

    <div class="feed" id="feed">
        {% for name, c in characters.items() %}
        <a href="/chat/{{ name }}" class="card character-card">
            <div class="img-box">
                <img src="{{ url_for('static', filename=c.image) }}" alt="{{ name }}">
                <div class="overlay"></div>
            </div>
            <div class="info">
                <h3>{{ name }}</h3>
                <p>{{ c.style }}</p>
            </div>
        </a>

        <!-- DYNAMIC NATIVE AD INJECTION -->
        {% if loop.index == 2 %}
        <div class="card character-card ad-card-wrapper" style="border-color: rgba(124, 58, 237, 0.25); display: flex; flex-direction: column; min-height: 390px;">
            <div class="img-box" style="height: auto; flex: 1; min-height: 280px; display: flex; align-items: center; justify-content: center; background: rgba(15, 12, 26, 0.3);">
                <!-- Adsterra Container Render Target -->
                <div id="container-0882fc47ffd4aea098bb26ed2dd6a149" style="width: 100%; height: 100%;"></div>
            </div>
            <div class="info" style="position: relative; background: linear-gradient(to top, #09090b 80%, transparent); padding: 16px 22px;">
                <h3 style="font-size: 16px; color: #a5b4fc; display: flex; align-items: center; gap: 6px;">
                    <span style="font-size: 11px; background: rgba(165, 180, 252, 0.15); padding: 2px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px;">Sponsored</span>
                    Hot Recommendations
                </h3>
                <p style="font-size: 12px; color: #71717a; margin-top: 2px;">Discover curated dynamic choices nearby...</p>
            </div>
        </div>
        {% endif %}
        
        {% endfor %}
    </div>

    <script>
        if (!localStorage.getItem("genderSelected")) {
            window.location.href = "/";
        }

        document.getElementById("searchBox").addEventListener("input", function () {
            let query = this.value.toLowerCase();
            
            // Modified selector loop to make sure search filters out the ad unit card alongside normal elements
            document.querySelectorAll(".character-card").forEach(card => {
                if (card.classList.contains('ad-card-wrapper')) {
                    // Hide ad container block if user starts explicitly typing values into filter tool
                    card.style.display = query ? "none" : "flex";
                } else {
                    let text = card.innerText.toLowerCase();
                    card.style.display = text.includes(query) ? "block" : "none";
                }
            });
        });
    </script>

    <!-- Social Bar Script Trigger Script remains safe at the bottom -->
    <script src="https://pl29685963.effectivecpmnetwork.com/aa/67/39/aa6739f3ca5a3359a953f59691ef2bba.js"></script>
</body>
</html>
