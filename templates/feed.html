<!DOCTYPE html>
<html lang="en">
<head>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-LL1W3YZC05"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-LL1W3YZC05');
</script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<!-- 🔥 GENDER OVERLAY -->
<div id="gender-screen" class="gender-screen" style="display:none;">
  <div class="gender-box glass">
    <h2>Select Your Gender</h2>

    <button onclick="setGender('male')">👦 Male</button>
    <button onclick="setGender('female')">👧 Female</button>
  </div>
</div>

<!-- HEADER -->
<div class="feed-header">
  <h2>Explore</h2>
  <span>Find your vibe 😏</span>
</div>

<!-- SEARCH -->
<div class="search-bar">
  <input type="text" placeholder="Search characters..." id="searchBox">
</div>

<!-- FEED -->
<div class="feed" id="feed">
{% for name, c in characters.items() %}
<a href="/chat/{{ name }}" class="card">

  <div class="img-box">
    <img src="{{ url_for('static', filename=c.image) }}" alt="{{ name }}">
    <div class="overlay"></div>
  </div>

  <div class="info">
    <h3>{{ name }}</h3>
    <p>{{ c.style }}</p>
  </div>

</a>
{% endfor %}
</div>

<script>

// ✅ SHOW OVERLAY ONLY ONCE (FIXED)
window.addEventListener("load", function () {
  if (!localStorage.getItem("genderSelected")) {
    document.getElementById("gender-screen").style.display = "flex";
  }
});

// ✅ SET GENDER (FIXED)
function setGender(gender) {
  fetch("/set_gender", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ gender })
  });

  localStorage.setItem("genderSelected", "true"); // save

  document.getElementById("gender-screen").style.display = "none";
}

// ✅ SEARCH FILTER
document.getElementById("searchBox").addEventListener("input", function () {
  let value = this.value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    let text = card.innerText.toLowerCase();
    card.style.display = text.includes(value) ? "block" : "none";
  });
});

</script>

</body>
</html>
