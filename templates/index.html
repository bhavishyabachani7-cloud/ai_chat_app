<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI — Select Persona</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="feed-header">
        <h2>Choose Your Companion</h2>
        <span>Select an entity to initiate an unfiltered roleplay session</span>
    </div>

    <div class="feed">
        {% for name, c in characters.items() %}
        <a href="/chat/{{ name }}" class="card">
            <div class="img-box">
                <img src="{{ url_for('static', filename=c.image) }}" alt="{{ name }}">
                <div class="overlay"></div>
            </div>
            <div class="info">
                <h3>{{ name }}</h3>
                <p>{{ c.role }}</p>
            </div>
        </a>
        {% endfor %}
    </div>

</body>
</html>
