<!DOCTYPE html>
<html>
<head>
<title>AI Chat Premium</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<div class="sidebar">

<h2>AI Chat</h2>

{% for c, data in characters.items() %}
<a href="/chat/{{c}}" class="character">
<img src="{{data.image}}" class="avatar">
<span>{{c}}</span>
</a>
{% endfor %}

</div>

<div class="main">
<h1>Start Chatting 💬</h1>
<p>Select a character from left</p>
</div>

</div>

</body>
</html>
