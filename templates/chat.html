<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="chat-header">
  <div class="avatar"></div>
  <div>
    <div class="name">{{char}}</div>
    <div class="status">online</div>
  </div>
</div>

<div id="chat-box"></div>

<div class="input-bar">
  <input id="msg" placeholder="Type your message...">
  <button onclick="send()">➤</button>
</div>

<div class="mode-bar">
  <button class="active" onclick="setMode('friendly',this)">Friendly</button>
  <button onclick="setMode('flirty',this)">Flirty</button>
  <button onclick="setMode('romantic',this)">Romantic</button>
  <button onclick="setMode('bold',this)">Bold</button>
  <button onclick="setMode('roleplay',this)">Roleplay</button>
</div>

<script>
let character="{{char}}"

function setMode(mode,btn){
document.querySelectorAll(".mode-bar button").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")

fetch("/set_mode",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({character:character,mode:mode})
})
}

function add(type,text){
let div=document.createElement("div")
div.className="msg "+type
div.innerText=text
document.getElementById("chat-box").appendChild(div)
scrollDown()
}

function scrollDown(){
let box=document.getElementById("chat-box")
box.scrollTop=box.scrollHeight
}

function showTyping(){
let div=document.createElement("div")
div.className="msg bot typing"
div.id="typing"
div.innerText="Typing..."
document.getElementById("chat-box").appendChild(div)
scrollDown()
}

function removeTyping(){
let t=document.getElementById("typing")
if(t) t.remove()
}

window.onload = async function(){
showTyping()

let res = await fetch("/chat_api",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:"start",character:character})
})

let data = await res.json()

setTimeout(()=>{
removeTyping()
add("bot",data.reply)
},1200)
}

async function send(){
let input=document.getElementById("msg")
let msg=input.value.trim()
if(!msg) return

add("me",msg)
input.value=""

showTyping()

let res = await fetch("/chat_api",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:msg,character:character})
})

let data = await res.json()

setTimeout(()=>{
removeTyping()
add("bot",data.reply)
},800)
}
</script>

</body>
</html>
