<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Chat Room</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script defer src="https://cloud.umami.is/script.js" data-website-id="b8485b12-8cfa-4e25-852d-c08c9b03defc"></script>
    <style>
        /* Floating Announcement Bar Pop-up Styles */
        .gallery-alert-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.9), rgba(124, 58, 237, 0.9));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 10px 16px;
            border-radius: 14px;
            margin: 10px 15px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3), 0 0 15px rgba(124, 58, 237, 0.2);
            transition: transform 0.2s ease, opacity 0.2s ease;
            animation: slideUpPopup 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .gallery-alert-bar:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.3);
        }
        .gallery-alert-content {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ffffff;
            font-size: 13.5px;
            font-weight: 500;
        }
        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
            animation: alertPulse 1.8s infinite;
        }
        .close-alert-btn {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: color 0.2s, background-color 0.2s;
        }
        .close-alert-btn:hover {
            color: #ffffff;
            background-color: rgba(255, 255, 255, 0.1);
        }
        @keyframes alertPulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        @keyframes slideUpPopup {
            from { transform: translateY(15px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="chat-container">

    <div class="chat-header">
        <div class="chat-header-left">
            <img src="{{ url_for('static', filename=characters[char].image) }}" alt="{{ char }}">
            <div class="chat-info">
                <div class="name">{{ char }}</div>
                <div class="status">Online & Responsive</div>
            </div>
        </div>
        
        <div class="chat-header-right">
            <div class="lang-selector-pill">
                <button onclick="toggleLanguage('english', this)" class="lang-toggle-btn active" id="btn-lang-en">EN</button>
                <button onclick="toggleLanguage('hindi', this)" class="lang-toggle-btn" id="btn-lang-hi">हिं</button>
            </div>
            <a href="/feed" class="back-feed-btn">✕ Leave Room</a>
        </div>
    </div>

    <div class="categories">
        <button onclick="setMode('friendly', this)" class="active">😊 Casual</button>
        <button onclick="setMode('romantic', this)">❤️ Romantic</button>
        <button onclick="setMode('bold', this)">😏 Seductive</button>
        <button onclick="setMode('intense', this)">🔥 Uninhibited</button>
        <button onclick="setMode('roleplay', this)">🎭 Story-Driven</button>
        
        <a id="gallery-vault-link" href="/gallery/{{ char }}" style="text-decoration: none; margin-left: auto;">
            <button style="background: linear-gradient(135deg, #f472b6, #d946ef); color: white; border-color: transparent; font-weight: 600; padding: 10px 20px; border-radius: 999px; cursor: pointer;">👗 View Outfits</button>
        </a>
    </div>

    <div id="chat-box"></div>

    <div id="typing" class="typing" style="display: none;">
        <span></span><span></span><span></span>
    </div>

    <div class="gallery-alert-bar" id="galleryAlert" onclick="navigateToGallery()">
        <div class="gallery-alert-content">
            <span class="pulse-dot"></span>
            <span>✨ Unlock Milestones: Now you can see images by clicking here!</span>
        </div>
        <button class="close-alert-btn" onclick="dismissAlert(event)">✕</button>
    </div>

    <div class="chat-input-area">
        <div class="chat-input-wrapper">
            <input id="msg" placeholder="Type an action or reply here..." autocomplete="off">
            <button onclick="sendMsg()">➤</button>
        </div>
    </div>

</div>

<script>
    const CHARACTER = "{{ char }}";
    const CHARACTER_IMAGE = "{{ characters[char].image }}";
    
    let currentLang = "english"; 

    function toggleLanguage(lang, element) {
        currentLang = lang;
        document.querySelectorAll('.lang-toggle-btn').forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');
        
        const inputField = document.getElementById('msg');
        if (inputField && !inputField.hasAttribute("disabled")) {
            if (lang === 'hindi') {
                inputField.placeholder = "यहाँ संदेश या अपनी कोई हरकत लिखें...";
            } else {
                inputField.placeholder = "Type an action or reply here...";
            }
        }
    }

    // Helper to pull clean query configuration payloads
    function getUserId() {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get('user_id') || 'default_user_2026';
    }

    // Action execution layer for main pop-up redirects
    function navigateToGallery() {
        window.location.href = `/gallery/${CHARACTER}?user_id=${getUserId()}`;
    }

    // Safely dismiss the pop-up without firing background anchor handlers
    function dismissAlert(event) {
        event.stopPropagation();
        const alertBar = document.getElementById('galleryAlert');
        if (alertBar) {
            alertBar.style.opacity = '0';
            setTimeout(() => alertBar.remove(), 200);
        }
    }

    // Dynamic Parameter Passing Injection Block
    window.addEventListener('DOMContentLoaded', () => {
        const vaultLink = document.getElementById('gallery-vault-link');
        if (vaultLink) {
            vaultLink.href = `/gallery/${CHARACTER}?user_id=${getUserId()}`;
        }
    });
</script>
<script src="{{ url_for('static', filename='chat.js') }}"></script>
<script src="https://pl29685963.effectivecpmnetwork.com/aa/67/39/aa6739f3ca5a3359a953f59691ef2bba.js"></script>
</body>
</html>
