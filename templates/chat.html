<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Chat Room</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script defer src="https://cloud.umami.is/script.js" data-website-id="b8485b12-8cfa-4e25-852d-c08c9b03defc"></script>
</head>
<body>

<div class="chat-container">

    <div class="chat-header">
        <div class="chat-header-left">
            <img src="{{ url_for('static', filename=characters[char].image) }}" alt="{{ char }}">
            <div class="chat-info">
                <div class="name">{{ char }}</div>
                <div class="status">Online & Responsive</div>
            </div>
        </div>
        
        <div class="chat-header-right">
            <div class="lang-selector-pill">
                <button onclick="toggleLanguage('english', this)" class="lang-toggle-btn active" id="btn-lang-en">EN</button>
                <button onclick="toggleLanguage('hindi', this)" class="lang-toggle-btn" id="btn-lang-hi">हिं</button>
            </div>
            <a href="/feed" class="back-feed-btn">✕ Leave Room</a>
        </div>
    </div>

    <div class="categories">
        <button onclick="setMode('friendly', this)" class="active">😊 Casual</button>
        <button onclick="setMode('romantic', this)">❤️ Romantic</button>
        <button onclick="setMode('bold', this)">😏 Seductive</button>
        <button onclick="setMode('intense', this)">🔥 Uninhibited</button>
        <button onclick="setMode('roleplay', this)">🎭 Story-Driven</button>
    </div>

    <div id="chat-box"></div>

    <div id="typing" class="typing" style="display: none;">
        <span></span><span></span><span></span>
    </div>

    <div class="chat-input-area">
        <div class="chat-input-wrapper">
            <input id="msg" placeholder="Type an action or reply here..." autocomplete="off">
            <button onclick="sendMsg()">➤</button>
        </div>
    </div>

</div>

<script>
    const CHARACTER = "{{ char }}";
    const CHARACTER_IMAGE = "{{ characters[char].image }}";
    
    // Default global system tracking parameter initialization
    let currentLang = "english"; 

    function toggleLanguage(lang, element) {
        currentLang = lang;
        
        // Wipe old active validation states across buttons
        document.querySelectorAll('.lang-toggle-btn').forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');
        
        // Dynamically shift placeholders to signal tracking shifts to the user
        const inputField = document.getElementById('msg');
        if (inputField && !inputField.hasAttribute("disabled")) {
            if (lang === 'hindi') {
                inputField.placeholder = "यहाँ संदेश या अपनी कोई हरकत लिखें...";
            } else {
                inputField.placeholder = "Type an action or reply here...";
            }
        }
    }
</script>
<script src="{{ url_for('static', filename='chat.js') }}"></script>

<script src="https://pl29685963.effectivecpmnetwork.com/aa/67/39/aa6739f3ca5a3359a953f59691ef2bba.js"></script>
</body>
</html>
